substitutions:
  _HELM_VERSION: '0.4.36'
  _REGION: 'us-central1-a'
  _CLUSTER: 'central-cluster'
  _LIFECYCLE: ''
  # _APP_CODE, _GKE_PROJECT, _JIRA_KEY provided by trigger

steps:
  - name: gcr.io/cloud-builders/docker:latest
    entrypoint: bash
    args:
      - '-c'
      - |
        LC="${_LIFECYCLE:-$(echo "$BRANCH_NAME" | grep -oiE "${_JIRA_KEY}-[0-9]+" | tr '[:upper:]' '[:lower:]' | head -1)}"
        REG="us-central1-docker.pkg.dev/$PROJECT_ID/$$LC-${_APP_CODE}-v3-images"
        docker pull $$REG/api:latest || true
        DOCKER_BUILDKIT=1 docker build \
          --cache-from $$REG/api:latest \
          -t $$REG/api:$COMMIT_SHA \
          -t $$REG/api:latest \
          ./src/api
        docker push $$REG/api:$COMMIT_SHA
        docker push $$REG/api:latest
    id: Build-api

  - name: gcr.io/cloud-builders/docker:latest
    entrypoint: bash
    args:
      - '-c'
      - |
        LC="${_LIFECYCLE:-$(echo "$BRANCH_NAME" | grep -oiE "${_JIRA_KEY}-[0-9]+" | tr '[:upper:]' '[:lower:]' | head -1)}"
        REG="us-central1-docker.pkg.dev/$PROJECT_ID/$$LC-${_APP_CODE}-v3-images"
        docker pull $$REG/react:latest || true
        DOCKER_BUILDKIT=1 docker build \
          --cache-from $$REG/react:latest \
          -t $$REG/react:$COMMIT_SHA \
          -t $$REG/react:latest \
          ./src/react
        docker push $$REG/react:$COMMIT_SHA
        docker push $$REG/react:latest
    id: Build-react

  - name: gcr.io/walker-cpl/helm-cd:0.0.10
    entrypoint: bash
    args:
      - '-c'
      - |
        LC="${_LIFECYCLE:-$(echo "$BRANCH_NAME" | grep -oiE "${_JIRA_KEY}-[0-9]+" | tr '[:upper:]' '[:lower:]' | head -1)}"
        /update.sh ${_CLUSTER} ${_REGION} ${_GKE_PROJECT} $$LC-${_APP_CODE} \
          ${_HELM_VERSION} $COMMIT_SHA false
    id: Update-Images
    waitFor: ['Build-api', 'Build-react']

timeout: 1800s

options:
  machineType: E2_HIGHCPU_32
  logging: LEGACY
