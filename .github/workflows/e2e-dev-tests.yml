name: E2E Dev Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - src/react/**
    branches:
      - dev
      - ops

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/cache@v4
        id: yarn-cache
        with:
          path: src/react/node_modules
          key: node-modules-${{ hashFiles('src/react/yarn.lock') }}

      - name: Install
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        working-directory: src/react
        run: yarn install --frozen-lockfile

      - name: Build
        working-directory: src/react
        run: yarn build

      - uses: actions/upload-artifact@v4
        with:
          name: react-build
          path: src/react/build/

  component:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/cache@v4
        with:
          path: src/react/node_modules
          key: node-modules-${{ hashFiles('src/react/yarn.lock') }}

      - name: Component Tests
        uses: cypress-io/github-action@v6.0.0
        with:
          working-directory: src/react
          install: false
          component: true
          browser: chrome
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/cache@v4
        with:
          path: src/react/node_modules
          key: node-modules-${{ hashFiles('src/react/yarn.lock') }}

      - uses: actions/download-artifact@v4
        with:
          name: react-build
          path: src/react/build/

      - name: E2E Tests
        uses: cypress-io/github-action@v6.0.0
        with:
          working-directory: src/react
          install: false
          start: npx serve -s build -l 3000
          wait-on: 'http://localhost:3000'
          browser: chrome
          spec: cypress/e2e/**
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
