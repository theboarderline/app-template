name: Dev Integration Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - src/react/**
    branches:
      - dev
      - ops

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          cache-dependency-path: src/react/yarn.lock

      - name: Install and verify build
        working-directory: src/react
        run: yarn install && yarn build

  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'
          cache-dependency-path: src/react/yarn.lock

      - name: E2E Tests
        uses: cypress-io/github-action@v6.0.0
        with:
          working-directory: src/react
          install-command: yarn install
          start: yarn start
          browser: chrome
          spec: cypress/e2e/*
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
